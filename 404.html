<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Page not found — Koja</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&family=Source+Code+Pro:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script>
      // Resolve theme before first paint to avoid a flash of the wrong mode.
      const systemDark = matchMedia("(prefers-color-scheme: dark)");
      const applyTheme = (theme) => {
        document.documentElement.dataset.theme = theme;
      };
      applyTheme(
        localStorage.getItem("theme") ??
          (systemDark.matches ? "dark" : "light"),
      );
      systemDark.addEventListener("change", (event) => {
        if (!localStorage.getItem("theme")) {
          applyTheme(event.matches ? "dark" : "light");
        }
      });
    </script>
  </head>
  <body>
    <header class="nav">
      <a class="nav-brand" href="/">
        <img src="/logo.svg" alt="Koja" height="24" />
      </a>
      <div class="nav-right">
        <nav class="nav-links" id="nav-menu">
          <a href="https://github.com/koja-lang/koja/blob/main/LANGUAGE.md"
            >Language</a
          >
          <a href="https://github.com/koja-lang/koja/blob/main/INSTALLING.md"
            >Install</a
          >
          <a href="https://github.com/koja-lang/koja">GitHub</a>
          <a href="https://discord.gg/QB2DMTxRSh">Discord</a>
        </nav>
        <button class="theme-toggle" type="button" aria-label="Toggle theme">
          <svg
            class="icon-moon"
            viewBox="0 0 24 24"
            width="18"
            height="18"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
          </svg>
          <svg
            class="icon-sun"
            viewBox="0 0 24 24"
            width="18"
            height="18"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="4" />
            <path
              d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4m11.4-11.4 1.4-1.4"
            />
          </svg>
        </button>
        <button
          class="nav-toggle"
          type="button"
          aria-label="Toggle menu"
          aria-controls="nav-menu"
          aria-expanded="false"
        >
          <svg
            class="icon-menu"
            viewBox="0 0 24 24"
            width="20"
            height="20"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 6h18M3 12h18M3 18h18" />
          </svg>
          <svg
            class="icon-close"
            viewBox="0 0 24 24"
            width="20"
            height="20"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18 6 6 18M6 6l12 12" />
          </svg>
        </button>
      </div>
    </header>

    <main>
      <section class="error">
        <p class="error-code">404</p>
        <h1>This page wandered off.</h1>
        <p class="error-sub">
          The page you're looking for doesn't exist. Oops.
        </p>
        <div class="hero-actions">
          <a class="button primary" href="/">Back home</a>
          <a class="button" href="https://github.com/koja-lang/koja">
            View on GitHub
          </a>
        </div>
      </section>
    </main>

    <footer>
      <p>
        MIT licensed. Built with joy by
        <a href="https://github.com/hpopp">Henry Popp</a> and
        <a href="https://github.com/koja-lang/koja/graphs/contributors"
          >contributors</a
        >.
      </p>
      <p>
        <a href="https://github.com/koja-lang/koja">GitHub</a> ·
        <a href="https://github.com/koja-lang/koja/blob/main/CHANGELOG.md"
          >Changelog</a
        >
        ·
        <a href="https://github.com/koja-lang/koja/releases">Releases</a>
      </p>
    </footer>

    <script>
      document.querySelector(".theme-toggle").addEventListener("click", () => {
        const next =
          document.documentElement.dataset.theme === "dark" ? "light" : "dark";
        localStorage.setItem("theme", next);
        applyTheme(next);
      });

      const nav = document.querySelector(".nav");
      const navToggle = document.querySelector(".nav-toggle");
      const setMenuOpen = (open) => {
        nav.dataset.open = String(open);
        navToggle.setAttribute("aria-expanded", String(open));
        document.body.style.overflow = open ? "hidden" : "";
      };
      navToggle.addEventListener("click", () => {
        setMenuOpen(nav.dataset.open !== "true");
      });
      document.addEventListener("click", (event) => {
        if (nav.dataset.open === "true" && !nav.contains(event.target)) {
          setMenuOpen(false);
        }
      });
    </script>
  </body>
</html>
